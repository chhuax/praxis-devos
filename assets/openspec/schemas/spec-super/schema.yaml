name: spec-super
version: 1
description: Company OpenSpec workflow - proposal -> specs -> design -> tasks -> blackbox-test
artifacts:
  - id: proposal
    generates: proposal.md
    description: 变更提案文档，说明为什么要做这次变更
    template: proposal.md
    instruction: |
      创建 proposal 文档，说明这次变更为什么值得做。

      文档应保持简洁、稳定、便于评审，重点覆盖：
      - 背景与动机
      - 变更范围
      - 新增或修改的能力
      - 影响面

      其中 `Capabilities` 是 proposal 与 specs 之间的契约：
      - 新能力写入 `New Capabilities`
      - 需求级变更写入 `Modified Capabilities`

      每个 capability 都应能对应到后续 `specs/<name>/spec.md`。
    requires: []

  - id: specs
    generates: specs/**/*.md
    description: 详细规格文档，定义系统应该做什么
    template: spec.md
    instruction: |
      创建规格文档，定义系统“应该做什么”，而不是“内部如何实现”。

      要求：
      - 每个 capability 生成一个 spec 文件
      - 需求优先描述外部可观察行为
      - 每条需求必须可验证
      - 每条需求至少包含一个 `Scenario`

      保留 OpenSpec 兼容结构：
      - `## ADDED Requirements`
      - `## MODIFIED Requirements`
      - `## REMOVED Requirements`
      - `## RENAMED Requirements`
      - `### Requirement: <name>`
      - `#### Scenario: <name>`

      如果是修改已有需求，必须粘贴并修改完整 requirement block，不要只写差异摘要。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: 技术设计文档，说明如何实现这次变更
    template: design.md
    instruction: |
      创建设计文档，说明这次变更“如何实现”。

      设计文档应覆盖：
      - 背景、目标与非目标
      - 整体方案与关键流程
      - 关键设计决策与备选方案
      - 组件、接口、数据模型或状态流
      - 正确性与需求映射
      - 错误处理、验证策略、风险与回滚

      重点是解释为什么采用这个方案，以及如何证明它满足需求，而不是写成逐行实现说明。
    requires:
      - proposal
      - specs

  - id: tasks
    generates: tasks.md
    description: 可跟踪的实现任务清单
    template: tasks.md
    instruction: |
      创建任务清单，将实现工作拆成可跟踪、可验证的 task。

      重要约束：
      - 必须使用 `- [ ] X.Y 任务描述` 的 checkbox 格式
      - 一个 OpenSpec task 代表一个执行边界
      - 任务应尽量小到可以在一次专注实现中完成
      - 任务按依赖顺序组织
      - 默认保持简洁，避免把每个 task 都写成重型计划

      如有必要，可在 task 下按需补充子 bullets，例如：
      - 关联需求
      - 验证
      - 约束
      - 涉及文件

      `tasks.md` 是默认的执行入口和任务事实来源。不要把实现计划拆到额外目录里。
    requires:
      - specs
      - design

  - id: blackbox-test
    generates: blackbox-test.md
    description: 黑盒验证说明文档
    template: blackbox-test.md
    instruction: |
      创建黑盒验证文档，从外部行为角度说明如何验证这次变更。

      这个 artifact 是补充型输出，不是实现前置条件，也不是实现任务清单。
      它应基于 specs、design 和 tasks，提炼：
      - 成功路径
      - 失败或阻断路径
      - 兼容性与回归路径
      - 自动化验证如何映射到外部场景

      保持关注点在“外部可观察行为”和“验收语义”，不要写成实现步骤。
    requires:
      - specs
      - design
      - tasks

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    读取上下文文件后，一次只选择一个 pending task 推进。
    在实现前，先总结当前 task 的目标、约束和验证目标。
    如果当前 task 过大，只细化这个 task 本身，不要顺手扩展到其他 task。
    实现时只覆盖当前 task 的范围。
    完成实现后先运行该 task 对应的验证，再将其勾选完成。
    如果遇到阻塞、歧义或设计漂移，暂停并说明原因。
