openapi: 3.1.0
info:
  title: <Project Public API>
  version: 0.1.0
  description: Public API contract for <project>.
servers:
  - url: https://api.example.com
tags:
  - name: health
    description: Service health endpoints
paths:
  /health:
    get:
      tags:
        - health
      summary: Check service health
      operationId: getHealth
      responses:
        "200":
          description: Healthy response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Service status
          examples:
            - ok
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

