artifacts:
  - id: public-http-api
    kind: api-reference
    contract: contracts/openapi/public.yaml
    outputs:
      - docs/reference/api.md
    triggers:
      - controller
      - request-dto
      - response-dto
      - auth-scope
      - error-code
    requireGuideWhen:
      - breaking-change
      - onboarding-flow-change

  - id: app-config
    kind: config-reference
    contract: contracts/config/app.schema.json
    outputs:
      - docs/reference/config.md
    triggers:
      - env-var
      - config-binding
      - default-value-change

  - id: permissions
    kind: permission-reference
    contract: contracts/permissions/permissions.yaml
    outputs:
      - docs/reference/permissions.md
    triggers:
      - auth-annotation
      - permission-code
      - role-binding

