primary_surface: cli
cli_entrypoint: bin/praxis-devos.js
npm_package: praxis-devos
supported_agents:
  - opencode
  - codex
  - claude
  - copilot
commands:
  - setup
  - init
  - update
  - install-pack
  - status
  - doctor
  - bootstrap
bundled_skills:
  - devos-docs
  - devos-change-docs
project_config:
  package_json_field: praxis-devos.skillPacks
  note: "Projects may declare additional external packs here for project-bound projection flows, using either local paths or git URLs. The current `install-pack` command does not write project config. Praxis projects every currently supported resource type from a pack, and the resource registry is designed to expand to future types such as rules."
  supported_layouts:
    - skills/<name>/SKILL.md
    - commands/<name>.md
    - common/skills/<name>/SKILL.md + stacks/<stack>/skills/<name>/SKILL.md
    - common/commands/<name>.md + stacks/<stack>/commands/<name>.md
openspec_generated_skills:
  note: "Shipped as Praxis-managed workflow sources under `assets/openspec/workflows`; projected directly by `setup`/`update` after `openspec init --tools none`."
  items:
    - openspec-explore
    - openspec-propose
    - openspec-apply-change
    - openspec-archive-change
bundled_commands:
  - devos-docs-init
  - devos-docs-refresh
projection_targets:
  claude: ~/.claude/skills/<name>/SKILL.md + ~/.claude/commands/**
  copilot: ~/.claude/skills/<name>/SKILL.md (shared Claude-compatible discovery surface; commands not currently projected)
  codex: ~/.codex/skills/<name>/SKILL.md (Praxis initializes OpenSpec with delivery=skills for Codex, so prompts are not generated during init)
  opencode: ~/.claude/skills/<name>/SKILL.md + ~/.config/opencode/commands/*.md + ~/.config/opencode/config.json
external_dependencies:
  openspec: "@fission-ai/openspec (global npm)"
  superpowers_claude: "claude plugin install"
  superpowers_copilot: "none (shared ~/.claude skills projection only)"
  superpowers_codex: "git clone + symlink at ~/.codex/superpowers"
  superpowers_opencode: "declared in ~/.config/opencode/config.json"
