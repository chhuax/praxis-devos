name: Install Smoke

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:

concurrency:
  group: install-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            scenario: codex
          - os: macos-latest
            scenario: codex
          - os: windows-latest
            scenario: codex
          - os: ubuntu-latest
            scenario: opencode
          - os: windows-latest
            scenario: opencode
          - os: ubuntu-latest
            scenario: claude
          - os: windows-latest
            scenario: claude

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Show tool versions
        run: |
          node --version
          npm --version
          git --version

      - name: Pack tarball
        run: npm pack --json > pack.json

      - name: Export pack filename
        shell: bash
        run: |
          PACK_FILE="$(node -e "process.stdout.write(JSON.parse(require('node:fs').readFileSync('pack.json','utf8'))[0].filename)")"
          echo "PACK_FILE=$PACK_FILE" >> "$GITHUB_ENV"

      - name: Run install smoke
        run: node test/install-smoke-cli.mjs --package "${{ env.PACK_FILE }}" --scenario "${{ matrix.scenario }}"
