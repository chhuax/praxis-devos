name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Run tests
        run: npm test

      - name: CLI smoke checks
        run: |
          node bin/praxis-devos.js help
          node bin/praxis-devos.js status --agent opencode
          node bin/praxis-devos.js doctor --agent opencode
          node bin/praxis-devos.js bootstrap --agent claude

      - name: Pack dry run
        run: npm pack --dry-run --json
